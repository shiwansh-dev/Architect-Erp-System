  <defs>
    <linearGradient id="machGradientDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B8E6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A7C59;stop-opacity:1" />
    </linearGradient>
  </defs>
  <text x="60" y="28" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="url(#machGradientDark)">Mach</text>
  
